name: AutomataSimulator CI/CD

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  # ==========================================
  # СТАДИЯ 1: Линтер, Анализ и Модульные тесты
  # ==========================================
  lint-and-unit-tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Static Analysis (Build)
        run: dotnet build --no-restore -c Release /p:TreatWarningsAsErrors=true

      - name: Add Coverlet MSBuild
        run: dotnet add AutomataSimulator.Tests package coverlet.msbuild

      - name: Run Unit Tests with Coverage
        run: >
          dotnet test AutomataSimulator.Tests --no-build -c Release
          --filter "Category=Unit"
          --logger "trx;LogFileName=unit_results.trx"
          /p:CollectCoverage=true
          /p:Threshold=65

      # НОВЫЙ ШАГ: Вытаскиваем файл из дебрей папок в корень
      - name: Move Unit Test Results
        if: always()
        run: copy AutomataSimulator.Tests\TestResults\unit_results.trx .\unit_results.trx

      - name: Upload Unit Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-unit
          path: unit_results.trx # Теперь путь без папок!
  # ==========================================
  # СТАДИЯ 2: Интеграционные тесты
  # ==========================================
  integration-tests:
    needs: lint-and-unit-tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Run Integration Tests
        run: dotnet test AutomataSimulator.Tests --filter "Category=Integration" --logger "trx;LogFileName=integration_results.trx"

      # НОВЫЙ ШАГ: Вытаскиваем файл из дебрей папок в корень
      - name: Move Integration Test Results
        if: always()
        run: copy AutomataSimulator.Tests\TestResults\integration_results.trx .\integration_results.trx

      - name: Upload Integration Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-integration
          path: integration_results.trx # Теперь путь без папок!
  # ==========================================
  # СТАДИЯ 3: Генерация отчета Allure
  # ==========================================
  # ==========================================
  # СТАДИЯ 3: Генерация отчета Allure
  # ==========================================
  report:
    needs: [lint-and-unit-tests, integration-tests]
    if: always() # Выполняем даже если тесты упали
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Чтобы запустить конвертер, нам нужен .NET на этой Ubuntu машине
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # 1. Скачиваем ВСЕ артефакты в ОДНУ папку БЕЗ вложенных подпапок!
      - name: Download all Test Results
        uses: actions/download-artifact@v4
        with:
          path: allure-results
          merge-multiple: true

      # 2. Устанавливаем официальную утилиту конвертации TRX -> JUnit
      - name: Install trx2junit
        run: dotnet tool install -g trx2junit

      # 3. Конвертируем скачанные .trx файлы в .xml
      # Утилита положит их прямо рядом с .trx в папке allure-results
      - name: Convert TRX to JUnit XML
        run: trx2junit allure-results/*.trx

      # 4. Allure найдет .xml файлы в корне и сгенерирует графики!
      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        id: allure-report
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history

      # 5. Публикуем на GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history